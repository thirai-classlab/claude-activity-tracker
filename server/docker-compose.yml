version: "3.8"

services:
  db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: claude_tracker
      MYSQL_USER: tracker
      MYSQL_PASSWORD: trackerpass
    expose:
      - "3306"
    # D-010: localhost-only bind for developer convenience
    # (Prisma Studio, manual `npm run sync-pricing` from host).
    # No external network exposure.
    # 固定ポート 3307（汎用 MariaDB の 3306 と衝突回避、複数開発環境共存可）
    ports:
      - "127.0.0.1:${DB_HOST_PORT:-3307}:3306"
    volumes:
      - db-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY}
    # 固定ポート 3010（一般的な dev server の 3000/3001 と衝突回避）
    ports:
      - "${HOST_PORT:-3010}:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - GITHUB_PAT=${GITHUB_PAT}
      - DOCS_DIR=/app/docs
    volumes:
      # Serve repository docs/ via Express /docs static route (read-only)
      # See server/src/index.ts and docs/decisions/resolved.md (D-007)
      - ../docs:/app/docs:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
